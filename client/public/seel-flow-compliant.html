<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seel Review Agent — 合规版流程</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0fdf4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px 60px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.logo {
  width: 36px; height: 36px;
  background: #10b981;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 15px;
  box-shadow: 0 4px 12px rgba(16,185,129,.35);
}
.header-text h1 { font-size: 17px; font-weight: 700; color: #1f2937; letter-spacing: -.3px; }
.header-text p  { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.card {
  background: white;
  border-radius: 20px;
  padding: 36px;
  box-shadow: 0 4px 40px rgba(16,185,129,.08), 0 1px 3px rgba(0,0,0,.06);
  width: 100%;
  max-width: 920px;
}
svg { display: block; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }
footer {
  margin-top: 20px;
  font-size: 11px;
  color: #d1d5db;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: #6b7280; font-size: 11px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-line { width: 18px; height: 2px; flex-shrink: 0; border-radius: 2px; }
</style>
</head>
