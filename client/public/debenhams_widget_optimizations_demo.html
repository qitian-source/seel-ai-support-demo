<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debenhams × Seel Support Agent — Widget Optimizations · Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --brand:#1a1a1a;          /* Debenhams wordmark black */
  --brand-text:#ffffff;
  --accent:#b8895b;          /* warm Debenhams gold accent */
  --bot-bubble:#f3f4f6;
  --bot-text:#1f2937;
  --user-bubble:#1a1a1a;
  --user-text:#ffffff;
  --win-bg:#ffffff;
  --radius:16px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
  background:#f5f5f5; color:#1a1a1a; font-size:14px; line-height:1.5;
}

/* ── Demo banner ─────────────────────────── */
#demo-bar{
  background:#111; color:#e5e7eb; padding:9px 20px;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap; user-select:none;
  border-bottom:1px solid #000;
}
#demo-bar .pill{
  background:var(--accent); color:#111; font-size:10px; font-weight:800;
  padding:3px 9px; border-radius:20px; letter-spacing:.06em;
}
#demo-bar .label{ font-size:12px; color:#cbd5e1; }
#demo-bar .feats{ display:flex; gap:8px; flex-wrap:wrap; margin-left:auto; align-items:center;}
#demo-bar .feat{
  font-size:11px; color:#d1d5db; background:#1f2937; border:1px solid #374151;
  border-radius:20px; padding:4px 11px; display:flex; align-items:center; gap:6px;
}
#demo-bar .feat b{ color:#fff; font-weight:700;}
#demo-bar .feat .n{
  background:var(--accent); color:#111; font-weight:800; font-size:10px;
  width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.slow-toggle{
  display:flex; align-items:center; gap:7px; font-size:11px; color:#cbd5e1; cursor:pointer;
  background:#1f2937; border:1px solid #374151; border-radius:20px; padding:4px 11px;
}
.slow-toggle input{ accent-color:var(--accent); cursor:pointer;}

/* ── Storefront ─────────────────────────── */
#store{ min-height:calc(100vh - 42px); }
.deb-nav{
  background:#fff; border-bottom:1px solid #e5e7eb; height:64px;
  display:flex; align-items:center; justify-content:space-between; padding:0 40px;
  position:sticky; top:0; z-index:10;
}
.deb-logo{ font-size:26px; font-weight:800; letter-spacing:-.5px; color:#111; text-decoration:none;}
.deb-logo span{ color:var(--accent); }
.deb-navlinks{ display:flex; gap:28px; font-size:13px; font-weight:600; color:#374151;}
.deb-navlinks a{ text-decoration:none; color:inherit; cursor:pointer;}
.deb-navlinks a:hover{ color:var(--accent);}
.deb-navicons{ display:flex; gap:18px; color:#374151; }

.hero{
  height:300px; background:linear-gradient(120deg,#1a1a1a 0%,#2d2d2d 60%,#3a2e26 100%);
  color:#fff; display:flex; flex-direction:column; justify-content:center; padding:0 56px;
}
.hero .kicker{ font-size:12px; letter-spacing:.25em; text-transform:uppercase; color:var(--accent); font-weight:700;}
.hero h1{ font-size:42px; font-weight:800; margin:10px 0 8px; letter-spacing:-1px;}
.hero p{ font-size:15px; color:#d1d5db; max-width:460px;}
.hero .cta{
  margin-top:20px; align-self:flex-start; background:#fff; color:#111; border:none;
  font-weight:700; font-size:13px; padding:12px 26px; border-radius:6px; cursor:pointer;
}

.grid{ max-width:1040px; margin:40px auto; padding:0 40px 100px; }
.grid h2{ font-size:18px; font-weight:700; margin-bottom:18px;}
.cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
.card{ display:block; text-decoration:none; color:inherit; }
.card .ph{ aspect-ratio:1; background:#ececec; border-radius:10px; transition:background .15s; }
.card:hover .ph{ background:#e2e2e2; }
.card .nm{ font-size:13px; font-weight:600; margin-top:10px;}
.card:hover .nm{ color:var(--accent); }
.card .pr{ font-size:13px; color:#6b7280; }

/* breadcrumb + product detail page (for the cross-page persistence demo) */
.breadcrumb{ max-width:1040px; margin:18px auto 0; padding:0 40px; font-size:12px; color:#9ca3af;}
.breadcrumb a{ color:#6b7280; text-decoration:none;}
.breadcrumb a:hover{ color:var(--accent);}
.pdp{ max-width:1040px; margin:24px auto; padding:0 40px 120px; display:grid; grid-template-columns:1fr 1fr; gap:48px;}
.pdp .img{ aspect-ratio:1; background:#ececec; border-radius:14px;}
.pdp .back{ display:inline-block; margin-bottom:14px; font-size:13px; color:#6b7280; text-decoration:none;}
.pdp .back:hover{ color:var(--accent);}
.pdp h1{ font-size:28px; font-weight:800; letter-spacing:-.5px;}
.pdp .price{ font-size:22px; color:#111; margin:8px 0 18px;}
.pdp p{ color:#6b7280; margin-bottom:26px; max-width:420px;}
.pdp .bag{ background:#1a1a1a; color:#fff; border:none; padding:14px 30px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer;}
.pdp .bag:hover{ background:#000; }

/* ── Launcher ─────────────────────────── */
#launcher{
  position:fixed; bottom:24px; right:24px; width:58px; height:58px; border-radius:50%;
  background:var(--brand); color:#fff; border:none; cursor:pointer; z-index:50;
  box-shadow:0 8px 28px rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center;
  transition:transform .18s ease;
}
#launcher:hover{ transform:scale(1.06); }
#launcher svg{ width:26px; height:26px;}
#launcher .dot{
  position:absolute; top:2px; right:2px; width:14px; height:14px; border-radius:50%;
  background:var(--accent); border:2px solid var(--brand); display:none;
}
#launcher.has-session .dot{ display:block; }

/* ── Widget window ─────────────────────────── */
#widget{
  position:fixed; bottom:24px; right:24px; width:374px; height:560px; z-index:51;
  background:var(--win-bg); border-radius:var(--radius); overflow:hidden;
  box-shadow:0 18px 60px rgba(0,0,0,.30); display:flex; flex-direction:column;
  transform-origin:bottom right;
}
#widget.hidden{ display:none; }
@keyframes popin{ from{ opacity:0; transform:translateY(14px) scale(.96);} to{opacity:1; transform:none;} }
#widget.animate{ animation:popin .22s ease; }

.w-head{
  background:var(--brand); color:var(--brand-text); padding:13px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:grab; user-select:none; touch-action:none;
}
.w-head.dragging{ cursor:grabbing; }
.w-head .who{ display:flex; align-items:center; gap:10px;}
.w-ava{
  width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.16);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;
}
.w-head .nm{ font-size:14px; font-weight:700; line-height:1.2;}
.w-head .st{ font-size:11px; opacity:.8; display:flex; align-items:center; gap:5px;}
.w-head .st::before{ content:""; width:7px; height:7px; border-radius:50%; background:#34d399;}
.w-actions{ display:flex; align-items:center; gap:2px; position:relative;}
.w-btn{
  width:30px; height:30px; border:none; background:transparent; color:#fff; opacity:.8;
  border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  position:relative;
}
.w-btn:hover{ opacity:1; background:rgba(255,255,255,.14);}
.w-btn svg{ width:17px; height:17px;}
/* tooltip */
.w-btn::after{
  content:attr(data-tip); position:absolute; top:36px; right:0; white-space:nowrap;
  background:#111; color:#fff; font-size:10px; padding:4px 8px; border-radius:6px;
  opacity:0; pointer-events:none; transition:opacity .15s; z-index:5;
}
.w-btn:hover::after{ opacity:1; }

/* overflow (⋯) dropdown menu */
.w-menu{
  position:absolute; top:calc(100% + 10px); right:0; z-index:8; min-width:196px;
  background:#fff; border:1px solid #ececec; border-radius:12px; padding:6px;
  box-shadow:0 12px 34px rgba(0,0,0,.18); animation:fade .15s ease;
}
.w-menu.hidden{ display:none; }
.w-menu-item{
  display:flex; align-items:center; gap:11px; width:100%; padding:10px 11px;
  border:none; background:transparent; border-radius:8px; cursor:pointer;
  font-size:13px; color:#1f2937; text-align:left; font-family:inherit;
}
.w-menu-item:hover{ background:#f3f4f6; }
.w-menu-item svg{ width:16px; height:16px; color:#6b7280; flex-shrink:0; }

.w-body{ flex:1; padding:14px; overflow-y:auto; background:#fafafa; }
.w-disclose{ font-size:10px; color:#9ca3af; text-align:center; margin-bottom:10px;}

.row{ display:flex; margin-bottom:10px; align-items:flex-end; gap:8px;}
.row.bot{ justify-content:flex-start;}
.row.user{ justify-content:flex-end;}
.b-ava{
  width:26px; height:26px; border-radius:50%; background:var(--brand); color:#fff;
  font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.bubble{ max-width:78%; padding:9px 12px; font-size:13px; border-radius:14px; }
.row.bot .bubble{ background:var(--bot-bubble); color:var(--bot-text); border-bottom-left-radius:4px;}
.row.user .bubble{ background:var(--user-bubble); color:var(--user-text); border-bottom-right-radius:4px;}
@keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
.row{ animation:fade .2s ease; }

/* typing */
.typing{ display:flex; align-items:center; gap:4px; padding:11px 13px;}
.typing span{ width:7px; height:7px; border-radius:50%; background:#9ca3af; animation:bounce 1.3s infinite;}
.typing span:nth-child(2){ animation-delay:.18s;}
.typing span:nth-child(3){ animation-delay:.36s;}
@keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5;} 30%{ transform:translateY(-5px); opacity:1;} }

/* Slow-response reassurance — a quiet status caption, NOT an alert.
   Sits just under the typing dots in muted grey, the way Intercom / Zendesk
   surface an in-progress agent. No box, no border, no warning color. */
.reassure{
  font-size:11px; color:#9ca3af; line-height:1.45; text-align:center;
  margin:2px auto 10px; max-width:88%;
  animation:fade .3s ease;
}

/* suggested */
.w-sugg{ padding:0 14px 8px; display:flex; flex-wrap:wrap; gap:7px; background:#fafafa;}
.w-sugg button{
  font-size:11px; padding:6px 11px; border-radius:18px; border:1px solid #e5e7eb;
  background:#fff; color:#374151; cursor:pointer;
}
.w-sugg button:hover{ border-color:var(--accent); color:var(--accent);}

.w-input{ padding:10px 14px 8px; background:#fff; border-top:1px solid #f0f0f0;}
.w-input .field{
  display:flex; align-items:center; gap:8px; border:1px solid #e5e7eb; border-radius:24px;
  padding:5px 5px 5px 15px;
}
.w-input input{ flex:1; border:none; outline:none; font-size:13px; background:transparent;}
.w-send{
  width:34px; height:34px; border-radius:50%; border:none; background:var(--brand); color:#fff;
  cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.w-send svg{ width:16px; height:16px;}
.w-foot{ font-size:9px; color:#cbd5e1; text-align:center; margin-top:6px;}

/* toast */
#toast{
  position:fixed; bottom:96px; right:24px; z-index:60; background:#111; color:#fff;
  font-size:12px; padding:10px 16px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,.25);
  opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none;
}
#toast.show{ opacity:1; transform:none;}
</style>
</head>
<body>

<!-- Demo banner -->
<div id="demo-bar">
  <span class="pill">DEMO</span>
  <span class="label">Debenhams × Seel Support Agent — proposed widget optimizations (preview only)</span>
  <div class="feats">
    <span class="feat"><span class="n">1</span><b>X</b> clears chat</span>
    <span class="feat"><span class="n">2</span><b>Minimize</b> keeps session</span>
    <span class="feat"><span class="n">3</span><b>10s</b> reassurance</span>
    <span class="feat"><span class="n">4</span><b>Stays open</b> · drag to move</span>
    <span class="feat"><span class="n">5</span><b>Saved</b> across pages</span>
    <span class="feat"><span class="n">6</span><b>⋯</b> download transcript</span>
    <label class="slow-toggle" title="Forces the next AI reply to take ~13s so you can see the 10s reassurance message">
      <input type="checkbox" id="slow"> Simulate slow reply
    </label>
  </div>
</div>

<!-- Storefront mockup. Nav links are REAL anchors → each click is a genuine
     page navigation (full reload), proving the chat survives across pages. -->
<div id="store">
  <nav class="deb-nav">
    <a class="deb-logo" href="?page=home">deben<span>hams</span></a>
    <div class="deb-navlinks">
      <a href="?page=women">Women</a><a href="?page=men">Men</a><a href="?page=homeware">Home</a><a href="?page=beauty">Beauty</a><a href="?page=brands">Brands</a><a href="?page=sale">Sale</a>
    </div>
    <div class="deb-navicons">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>
  </nav>

  <!-- page content is rendered per-route into here -->
  <div id="main"></div>
</div>

<!-- Launcher bubble -->
<button id="launcher" aria-label="Open chat">
  <span class="dot"></span>
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<!-- Widget window -->
<div id="widget" class="hidden">
  <div class="w-head">
    <div class="who">
      <div class="w-ava">A</div>
      <div>
        <div class="nm">Ava · Seel Support</div>
        <div class="st">Online</div>
      </div>
    </div>
    <div class="w-actions">
      <button class="w-btn" id="btn-more" data-tip="More" aria-label="More options">
        <svg fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
      </button>
      <button class="w-btn" id="btn-min" data-tip="Minimize — keeps your chat" aria-label="Minimize">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <button class="w-btn" id="btn-close" data-tip="Close — clears this chat" aria-label="Close and clear">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <!-- overflow menu (opens under the ⋯ button) -->
      <div class="w-menu hidden" id="w-menu">
        <button class="w-menu-item" id="mi-download">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          Download transcript
        </button>
      </div>
    </div>
  </div>

  <div class="w-body" id="body"></div>

  <div class="w-sugg" id="sugg"></div>

  <div class="w-input">
    <div class="field">
      <input id="input" type="text" placeholder="Type your message…" autocomplete="off">
      <button class="w-send" id="send" aria-label="Send">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>
    <div class="w-foot">Powered by Seel</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ---------- storefront pages (real navigation, for the persistence demo) ---------- */
const PRODUCTS = [
  {id:'wool-coat',   name:'Knitted wool coat',   price:'£89.00'},
  {id:'ankle-boots', name:'Leather ankle boots', price:'£65.00'},
  {id:'silk-scarf',  name:'Silk blend scarf',    price:'£28.00'},
  {id:'blazer',      name:'Tailored blazer',     price:'£75.00'},
  {id:'cashmere',    name:'Cashmere jumper',     price:'£99.00'},
  {id:'midi-skirt',  name:'Pleated midi skirt',  price:'£42.00'},
];
const DEPT_LABELS = { home:'New Season', women:'Women', men:'Men', homeware:'Home', beauty:'Beauty', brands:'Brands', sale:'Sale' };

function renderPage(){
  const params = new URLSearchParams(location.search);
  const page = params.get('page') || 'home';
  const pid = params.get('p');
  const main = document.getElementById('main');

  if(page === 'product'){
    const prod = PRODUCTS.find(p=>p.id===pid) || PRODUCTS[0];
    main.innerHTML = `
      <div class="breadcrumb"><a href="?page=home">Home</a> / <span>${prod.name}</span></div>
      <div class="pdp">
        <div class="img"></div>
        <div>
          <a class="back" href="?page=home">← Back to shop</a>
          <h1>${prod.name}</h1>
          <div class="price">${prod.price}</div>
          <p>A Debenhams wardrobe staple. Free delivery over £40 and free 28-day returns. Questions about sizing or your order? Ava is here in the chat — and she'll still be here on the next page.</p>
          <button class="bag">Add to bag</button>
        </div>
      </div>`;
    return;
  }

  const label = DEPT_LABELS[page] || 'New Season';
  const isHome = page === 'home';
  main.innerHTML = `
    ${isHome ? '' : `<div class="breadcrumb"><a href="?page=home">Home</a> / <span>${label}</span></div>`}
    <section class="hero">
      <div class="kicker">${isHome ? 'New Season' : label}</div>
      <h1>${isHome ? 'Effortless style,<br>delivered.' : label}</h1>
      <p>Discover the latest in fashion, beauty and home — with help on hand whenever you need it.</p>
      <button class="cta">Shop now</button>
    </section>
    <div class="grid">
      <h2>${isHome ? 'Trending now' : label + ' — bestsellers'}</h2>
      <div class="cards">
        ${PRODUCTS.map(p=>`<a class="card" href="?page=product&p=${p.id}"><div class="ph"></div><div class="nm">${p.name}</div><div class="pr">${p.price}</div></a>`).join('')}
      </div>
    </div>`;
}
renderPage();

/* ---------- widget state ---------- */
const WELCOME = "Hi! I'm Ava, your Debenhams support assistant. I can help track orders, returns, refunds and delivery. How can I help today?";
const SUGGESTIONS = ["Where is my order?","Start a return","Check my refund status","Cancel an order"];
/* This question simulates a real backend lookup that takes >10s, so the
   10s reassurance note appears before the answer lands. */
const SLOW_TRIGGER = "refund status";

let messages = [];          // {role:'bot'|'user', text}
let pendingTimers = [];      // timers for an in-flight reply

const $ = id => document.getElementById(id);
const widget = $('widget'), launcher = $('launcher'), body = $('body'), input = $('input');

function clearTimers(){ pendingTimers.forEach(clearTimeout); pendingTimers = []; }

/* ---------- Feature 5: persist the session across page navigations ----------
   The widget writes its conversation + open/minimized state + position to
   localStorage (per-domain), so it is restored on every new page load — exactly
   how the production widget keeps a shopper's chat alive as they browse. */
const STORE_KEY = 'seel_deb_widget_v1';
function widgetState(){
  if(!widget.classList.contains('hidden')) return 'open';
  return launcher.classList.contains('has-session') ? 'minimized' : 'closed';
}
function persist(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      messages, state: widgetState(), left: widget.style.left, top: widget.style.top
    }));
  }catch(e){/* storage unavailable — non-fatal for the demo */}
}
function loadSaved(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null; } }

function freshSession(){
  messages = [{role:'bot', text:WELCOME, time:Date.now()}];
  render();
}

function render(){
  body.innerHTML =
    `<div class="w-disclose">You're chatting with an AI assistant</div>` +
    messages.map(m => m.role==='bot'
      ? `<div class="row bot"><div class="b-ava">A</div><div class="bubble">${m.text}</div></div>`
      : `<div class="row user"><div class="bubble">${m.text}</div></div>`
    ).join('');
  // suggestions only at start of a conversation
  $('sugg').style.display = messages.length<=1 ? 'flex' : 'none';
  body.scrollTop = body.scrollHeight;
  persist();   // save conversation on every change
}

$('sugg').innerHTML = SUGGESTIONS.map(q=>`<button>${q}</button>`).join('');
$('sugg').querySelectorAll('button').forEach(b=>b.onclick=()=>{ input.value=b.textContent; sendMessage(); });

/* ---------- canned replies ---------- */
function reply(q){
  const t = q.toLowerCase();
  if(t.includes('where')&&t.includes('order')) return "I can track that right away — could you share your order number? It starts with <b>DEB-</b> and is in your confirmation email.";
  if(t.includes('return')) return "Happy to help with a return. Returns are free within 28 days. What's the order number for the item you'd like to send back?";
  if(t.includes('deliver')) return "Most Debenhams orders arrive within 3–5 working days. Share your order number and I'll pull up the latest tracking status for you.";
  if(t.includes('cancel')) return "If your order hasn't been dispatched yet, I can cancel it for you. Could you confirm the order number?";
  if(t.includes('refund status')) return "Thanks for waiting! I've checked with our payments system — your refund of <b>£42.00</b> was approved and is on its way to your original card. Allow 5–7 working days for it to appear.";
  if(t.includes('refund')) return "Refunds are issued to your original payment method within 5–7 working days of us receiving the return. Want me to check the status of a specific refund?";
  return "Got it — let me look into that for you. Could you share a little more detail, or your order number if it's order-related?";
}

/* ---------- send + typing + 10s reassurance ---------- */
function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  messages.push({role:'user', text, time:Date.now()});
  render();

  // typing indicator
  const typing = document.createElement('div');
  typing.className='row bot'; typing.id='typing';
  typing.innerHTML = `<div class="b-ava">A</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  // Slow when the toggle is on, OR when the question is the built-in slow demo question.
  const slow = $('slow').checked || text.toLowerCase().includes(SLOW_TRIGGER);
  const replyDelay = slow ? 13000 : 1400 + Math.random()*900;

  clearTimers();

  // Feature 3: if no reply within 10s, show a quiet status caption below the dots
  pendingTimers.push(setTimeout(()=>{
    const tp = $('typing');
    if(tp && !$('reassure-note')){
      const note = document.createElement('div');
      note.className='reassure'; note.id='reassure-note';
      note.textContent = "Still working on this — thanks for your patience.";
      tp.insertAdjacentElement('afterend', note);  // sits directly under the typing dots
      body.scrollTop = body.scrollHeight;
    }
  }, 10000));

  // actual reply
  pendingTimers.push(setTimeout(()=>{
    const n = $('reassure-note'); if(n) n.remove();
    const tp = $('typing'); if(tp) tp.remove();
    messages.push({role:'bot', text:reply(text), time:Date.now()});
    render();
  }, replyDelay));
}

$('send').onclick = sendMessage;
input.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(); });

/* ---------- open / minimize / close ---------- */
function openWidget(animate){
  widget.classList.remove('hidden');
  if(animate){ widget.classList.add('animate'); setTimeout(()=>widget.classList.remove('animate'),250); }
  launcher.style.display='none';
  if(messages.length===0) freshSession();
  input.focus();
  persist();
}

/* Feature 2: Minimize — collapse to launcher, KEEP the session */
function minimizeWidget(){
  clearTimers();
  widget.classList.add('hidden');
  launcher.style.display='flex';
  launcher.classList.add('has-session');   // dot shows a chat is waiting
  toast("Minimized — your conversation is saved");
  persist();
}

/* Feature 1: Close (X) — CLEAR the conversation */
function closeAndClear(){
  clearTimers();
  freshSession();                  // wipe history back to welcome
  widget.classList.add('hidden');
  launcher.style.display='flex';
  launcher.classList.remove('has-session');
  toast("Conversation cleared");
  persist();
}

launcher.onclick = ()=> openWidget(true);
$('btn-min').onclick = minimizeWidget;
$('btn-close').onclick = closeAndClear;

/* Feature 6: ⋯ overflow menu → download the chat transcript as a .txt file */
const menu = $('w-menu');
$('btn-more').onclick = ()=> menu.classList.toggle('hidden');
// close the menu when clicking elsewhere (does NOT close the chat window)
document.addEventListener('click', e=>{
  if(menu.classList.contains('hidden')) return;
  if(e.target.closest('#w-menu') || e.target.closest('#btn-more')) return;
  menu.classList.add('hidden');
});
$('mi-download').onclick = ()=>{
  menu.classList.add('hidden');
  const now = Date.now();
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || 'local time';
  const startedAt = messages[0] && messages[0].time ? messages[0].time : now;

  const fmtTime = ms => new Date(ms).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
  const fmtFull = ms => new Date(ms).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) + ' at ' + fmtTime(ms);

  // one line per message, mirroring "HH:MM AM | Sender: message"
  const body = messages.map(m => {
    const who = m.role==='bot' ? 'Ava (Debenhams Support)' : 'You';
    const when = fmtTime(m.time || startedAt);
    return `${when} | ${who}: ${m.text.replace(/<[^>]+>/g,'')}`;   // strip any HTML
  }).join('\n\n');

  const text =
`Conversation with Debenhams Support
Started on ${fmtFull(startedAt)} (${tz})

---

${body}

---
Exported from Debenhams Support on ${fmtFull(now)} (${tz})`;

  const d = new Date(now);
  const ymd = `${d.getFullYear()}_${String(d.getMonth()+1).padStart(2,'0')}_${String(d.getDate()).padStart(2,'0')}`;
  const url = URL.createObjectURL(new Blob([text], {type:'text/plain;charset=utf-8'}));
  const a = document.createElement('a');
  a.href = url; a.download = `debenhams_support_${ymd}.txt`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Transcript downloaded');
};

/* Feature 4: the chat window stays open while you interact with the rest of
   the page. There is intentionally NO "click outside to close" / blur handler —
   only the Minimize and Close buttons change its state. It can also be moved:
   drag it by the header and it stays open throughout. */
(function makeDraggable(){
  const head = widget.querySelector('.w-head');
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  head.addEventListener('pointerdown', e=>{
    if(e.target.closest('.w-btn')) return;          // ignore clicks on minimize / close
    const r = widget.getBoundingClientRect();
    widget.style.left=r.left+'px'; widget.style.top=r.top+'px';
    widget.style.right='auto'; widget.style.bottom='auto';   // switch from docked to free
    dragging=true; sx=e.clientX; sy=e.clientY; ox=r.left; oy=r.top;
    head.classList.add('dragging');
    head.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  head.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const maxX=window.innerWidth-widget.offsetWidth, maxY=window.innerHeight-widget.offsetHeight;
    const nx=Math.max(8, Math.min(ox+(e.clientX-sx), maxX-8));
    const ny=Math.max(8, Math.min(oy+(e.clientY-sy), maxY-8));
    widget.style.left=nx+'px'; widget.style.top=ny+'px';
  });
  const end=()=>{ if(dragging){ dragging=false; head.classList.remove('dragging'); persist(); } };
  head.addEventListener('pointerup', end);
  head.addEventListener('pointercancel', end);
})();

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ---------- restore on load (Feature 5) ---------- */
(function init(){
  const saved = loadSaved();
  if(saved && Array.isArray(saved.messages) && saved.messages.length){
    messages = saved.messages;
    // restore position first
    if(saved.left && saved.top){
      widget.style.left = saved.left; widget.style.top = saved.top;
      widget.style.right = 'auto'; widget.style.bottom = 'auto';
    }
    // restore open/min/closed state BEFORE render() (render persists, so the
    // correct state must already be applied or it would be overwritten)
    if(saved.state === 'open'){
      widget.classList.remove('hidden'); launcher.style.display='none';
    } else if(saved.state === 'minimized'){
      widget.classList.add('hidden'); launcher.style.display='flex'; launcher.classList.add('has-session');
    } else { // closed
      widget.classList.add('hidden'); launcher.style.display='flex'; launcher.classList.remove('has-session');
    }
    render();
  } else {
    // first ever visit — greet and open so reviewers see the widget immediately
    freshSession();
    openWidget(false);
  }
})();
</script>
