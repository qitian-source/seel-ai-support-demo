# Sales Agent — Performance（Analytics）改版

> **本次更新（v1.1）：** Sales Agent → Analytics（Performance）改版为「全漏斗」模型——KPI 由 4 个改为 6 个，Sales Trend 升级为柱+线 Composed Chart，Touchpoint 筛选改为下拉框，Breakdown 表新增 CVR 列。**Touchpoint 维度保持不变**（Resolution Center / WFP Confirmation Email / Support Chat / Search Bar）。

---

## 一、背景与范围

将 Sales Agent → Analytics 由「销售归因摘要」升级为完整的 **展示 → 点击 → 转化 → 营收** 全漏斗视图，让商家一眼看清 AI 推荐在每个环节的表现，并能下钻到订单。

> **范围说明：** 本次改版**仅调整指标与图表结构**，Touchpoint（渠道）维度完全保留原有 4 个，不做增删；订单详情面板（行点击展开）逻辑不变。

---

## 二、筛选器

| 筛选项 | 控件 | 可选值 |
|--------|------|--------|
| **Time range** | 下拉 | Last 7 days / Last 30 days / Last 90 days（默认 Last 7 days） |
| **Touchpoint** | 下拉多选 | Resolution Center / WFP Confirmation Email / Support Chat / Search Bar |

**Touchpoint 下拉筛选器交互：**

- 触发按钮默认显示「**All touchpoints**」；展开后含 **Clear All** + 四个勾选项 + **Apply** 按钮。
- 勾选为**草稿态**，点 **Apply** 才生效；点击面板外部则放弃改动。
- 按钮标签随选择变化：全选 → 「All touchpoints」；单选 → 触点名；多选 → 「N touchpoints」。
- 保留原有 4 项及配色，不做增删。**Clear All 后 Apply 回落为全选**。
- 所有 KPI、趋势图、Breakdown 表均随选中的 Touchpoint 与 Time range **实时联动**；环比（vs previous）按相同跨度的上一周期计算。

---

## 三、KPI 卡片（6 个，替换原 4 个）

| 指标 | 定义 | 计算方式 | 正向方向 |
|------|------|----------|----------|
| **Impressions** | AI 推荐的展示总次数 | Σ 选中 Touchpoint 的 impressions | 增加 ↑ |
| **Clicks** | 用户点击推荐的总次数 | Σ 选中 Touchpoint 的 clicks | 增加 ↑ |
| **CTR** | 点击率 | Clicks / Impressions | 增加 ↑ |
| **Orders** | 经推荐转化的订单数 | Σ 选中 Touchpoint 的 orders | 增加 ↑ |
| **CVR** | 转化率 | Orders / Clicks | 增加 ↑ |
| **Revenue** | 归因销售额（仅推荐商品价值） | Σ 选中 Touchpoint 的 revenue | 增加 ↑ |

> **归因口径：** Revenue 只统计推荐商品本身的价值，不含订单整体金额。

- 每张卡片：当前值 + 环比（% + 箭头 + 颜色，绿涨红跌）。
- 布局：宽屏一行 6 张（`grid-cols-6`），窄屏每行 3 张。

---

## 四、Daily Trend 图表（替换原 Sales Trend）

- 图表类型：**Composed Chart（柱 + 线组合图）**，双 Y 轴。
- X 轴：日期。
- 系列与映射：

| 系列 | 图形 | Y 轴 | 颜色 |
|------|------|------|------|
| **Impressions** | 柱状 Bar | 左轴 | 紫色 `#6c47ff` |
| **Clicks** | 实线 Line | 右轴 | 青色 `#06b6d4` |
| **Orders** | 实线 Line | 右轴 | 橙色 `#f59e0b` |
| **Revenue** | 虚线 Line | 左轴 | 绿色 `#10b981` |

- 标题「Daily trend」与图例同一行（左标题，右图例）。
- Tooltip：Revenue 显示为货币格式，其余显示千分位整数。

---

## 五、Performance Breakdown 表格（新增 CVR）

按 touchpoint 维度汇总，**点击任意行展开订单详情面板**（展示该渠道的转化订单，推荐商品高亮）。

| 列名 | 定义 |
|------|------|
| **Touchpoint** | 渠道名称（原 4 项） |
| **Impressions** | 展示总次数 |
| **Clicks** | 点击总次数 |
| **CTR** | Clicks / Impressions |
| **Orders** | 转化订单数 |
| **CVR** | Orders / Clicks |
| **Revenue** | 归因销售额，附环比变化（绿色 +x%） |

> 说明文案：「Revenue counts only the recommended product value. Click a row to see converted orders.」

---

## 六、验收要点

1. Touchpoint 筛选器为下拉框：默认「All touchpoints」，含 Clear All / 勾选列表 / Apply，点 Apply 才生效。
2. 筛选项为且仅为：Resolution Center、WFP Confirmation Email、Support Chat、Search Bar。
3. KPI 由 4 个变为 6 个（Impressions / Clicks / CTR / Orders / CVR / Revenue）。
4. Daily Trend 为柱 + 线 Composed Chart，双 Y 轴。
5. Breakdown 表新增 CVR 列；点击行仍能拉起订单详情面板。
6. 全部 KPI / 图表 / 表格随 Time range 与 Touchpoint 实时联动。

---

## 七、设计规范

- 主色：`#6c47ff`（紫色，品牌色）
- 正向趋势：Emerald `#10b981` ／ 负向趋势：Red `#ef4444`
- Touchpoint 配色：Resolution Center `#6c47ff` ／ WFP Confirmation Email `#f59e0b` ／ Support Chat `#10b981` ／ Search Bar `#3b82f6`
- 卡片圆角：`rounded-xl`（12px）；分隔线：`border-border/40`（半透明）
